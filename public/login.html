<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — ExpenseSplit</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body data-auth-page="login">
  <main class="auth-page">
    <section class="auth-showcase" aria-label="ExpenseSplit introduction">
      <a class="auth-brand" href="/login.html">
        <span class="brand-icon" aria-hidden="true"></span>
        ExpenseSplit
      </a>
      <div class="auth-message">
        <p class="auth-kicker">Money, made clearer</p>
        <h1>Know where it went. Know who owes what.</h1>
        <p>Track personal spending and shared expenses in one calm, private workspace.</p>
      </div>
      <div class="auth-proof" aria-label="Security features">
        <span>Protected account</span>
        <span>Private financial data</span>
      </div>
    </section>

    <section class="auth-form-side">
      <div class="auth-form-card">
        <h2>Welcome back</h2>
        <p class="auth-intro">Sign in to continue to your dashboard.</p>
        <div class="auth-error" id="authError" role="alert"></div>
        <form id="authForm" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-field">
              <input id="password" name="password" type="password" autocomplete="current-password" minlength="8" required />
              <button class="password-toggle" type="button" data-password-toggle="password">Show</button>
            </div>
          </div>
          <button class="btn btn-primary btn-lg auth-submit" id="submitBtn" type="submit">Sign in</button>
        </form>
        <p class="auth-switch">New to ExpenseSplit? <a href="/register.html">Create an account</a></p>
      </div>
    </section>
  </main>
  <script src="/js/auth-page.js"></script>
</body>
</html>
