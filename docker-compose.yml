version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb+srv://bhavin2005:Bhavin%402005@cluster1.mmzsbrb.mongodb.net/?appName=Cluster1
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-super_secret_refresh_key}
      - CLIENT_URL=http://localhost:5000
      - ACCESS_TOKEN_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=7d
    depends_on:
      - mongo
    volumes:
      - uploads-data:/app/backend/uploads

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
  uploads-data:
